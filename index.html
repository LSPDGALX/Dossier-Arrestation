<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossier d'arrestation</title>
<style>
  :root{
    --bg:#0e0f12;
    --panel:#16181d;
    --panel-2:#1c1f26;
    --line:#2a2e37;
    --text:#e8e9ec;
    --muted:#8b909c;
    --accent:#c23b3b;
    --accent-2:#d4a23b;
    --ok:#3bb273;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI",system-ui,sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  header{
    border-bottom:2px solid var(--accent);
    padding-bottom:18px;
    margin-bottom:28px;
  }
  .badge{
    display:inline-block;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--accent-2);
    border:1px solid var(--accent-2);
    padding:3px 8px;
    border-radius:3px;
    margin-bottom:10px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:30px;
    margin:0 0 6px;
    letter-spacing:0.5px;
  }
  header p{color:var(--muted);margin:0;font-size:14px;}

  .section-title{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin:28px 0 10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{margin-bottom:14px;}
  .field.full{grid-column:1/-1;}
  label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type=text], input[type=number], textarea{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  textarea{resize:vertical;min-height:80px;}
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--accent-2);
  }

  .check-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px;
    margin-top:24px;
  }
  .check-row input{width:18px;height:18px;accent-color:var(--accent);}
  .check-row label{margin:0;color:var(--text);font-size:14px;cursor:pointer;}

  button{
    width:100%;
    margin-top:24px;
    background:var(--accent);
    color:white;
    border:none;
    padding:14px;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.5px;
    border-radius:8px;
    cursor:pointer;
    transition:background .15s;
  }
  button:hover{background:#a83232;}
  button:disabled{background:#555;cursor:not-allowed;}

  .status{
    margin-top:14px;
    font-size:13px;
    padding:10px 12px;
    border-radius:6px;
    display:none;
  }
  .status.ok{display:block;background:rgba(59,178,115,.12);color:var(--ok);border:1px solid rgba(59,178,115,.3);}
  .status.err{display:block;background:rgba(194,59,59,.12);color:#ff8a8a;border:1px solid rgba(194,59,59,.3);}

  @media(max-width:560px){.grid{grid-template-columns:1fr;}}

  .infraction-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .infra-search-wrap{
    position:relative;
    border-bottom:1px solid var(--line);
  }
  .infra-search{
    width:100%;
    background:var(--panel-2);
    border:none;
    padding:13px 14px 13px 38px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  .infra-search:focus{outline:none;}
  .infra-search-icon{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:13px;
    pointer-events:none;
  }
  .infra-layout{
    display:grid;
    grid-template-columns:170px 1fr;
    max-height:620px;
  }
  .infra-cats{
    border-right:1px solid var(--line);
    overflow-y:auto;
    background:#121419;
  }
  .infra-cat{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:12px 14px;
    cursor:pointer;
    border-left:3px solid transparent;
    font-size:12.5px;
    color:var(--muted);
    transition:background .12s, color .12s;
  }
  .infra-cat:hover{background:var(--panel-2);color:var(--text);}
  .infra-cat.active{
    background:var(--panel-2);
    color:var(--text);
    border-left-color:var(--accent-2);
  }
  .infra-cat .cat-name{font-weight:600;line-height:1.3;}
  .infra-cat .cat-count{
    flex-shrink:0;
    font-size:10.5px;
    font-variant-numeric:tabular-nums;
    color:var(--muted);
    background:rgba(255,255,255,.05);
    padding:2px 7px;
    border-radius:10px;
  }
  .infra-cat.active .cat-count{color:var(--accent-2);background:rgba(212,162,59,.12);}
  .infra-list-col{display:flex;flex-direction:column;min-height:0;}
  .infra-row-grid{
    display:grid;
    grid-template-columns:28px 1fr 90px 60px;
    align-items:center;
    gap:10px;
  }
  .infra-col-head{
    padding:10px 14px;
    font-size:10px;
    font-weight:600;
    letter-spacing:.8px;
    text-transform:uppercase;
    color:var(--muted);
    border-bottom:1px solid var(--line);
    background:#121419;
    position:sticky;
    top:0;
    z-index:1;
  }
  .infra-col-head .ch-fine,
  .infra-col-head .ch-time{text-align:right;}
  .infra-list-col{position:relative;}
  .infra-list{
    overflow-y:auto;
    flex:1;
    scrollbar-width:thin;
    scrollbar-color:var(--accent-2) var(--panel-2);
  }
  .infra-list::-webkit-scrollbar{width:8px;}
  .infra-list::-webkit-scrollbar-track{background:var(--panel-2);}
  .infra-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .infra-list::-webkit-scrollbar-thumb:hover{background:var(--accent-2);}
  .infra-scroll-hint{
    position:absolute;
    left:0;right:0;bottom:0;
    height:26px;
    pointer-events:none;
    background:linear-gradient(to bottom, rgba(22,24,29,0), var(--panel));
    display:flex;
    align-items:flex-end;
    justify-content:center;
    font-size:10px;
    color:var(--accent-2);
    letter-spacing:1px;
    padding-bottom:3px;
    opacity:0;
    transition:opacity .15s;
  }
  .infra-scroll-hint.show{opacity:1;}
  .infra-item{
    cursor:pointer;
    padding:11px 14px;
    border-bottom:1px solid rgba(255,255,255,.04);
    border-left:3px solid transparent;
    transition:background .1s;
  }
  .infra-item:last-child{border-bottom:none;}
  .infra-item:hover{background:var(--panel-2);}
  .infra-item.is-selected{
    background:rgba(194,59,59,.08);
    border-left-color:var(--accent);
  }
  .infra-item input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
  .infra-item .infra-name{
    color:var(--text);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .infra-item.is-selected .infra-name{color:#fff;font-weight:600;}
  .infra-item .infra-fine{
    color:var(--accent-2);
    font-size:12.5px;
    font-variant-numeric:tabular-nums;
    text-align:right;
  }
  .infra-item .infra-time{
    color:var(--muted);
    font-size:12.5px;
    font-variant-numeric:tabular-nums;
    text-align:right;
  }
  .infra-empty{padding:36px 14px;text-align:center;color:var(--muted);font-size:13px;}

  .infra-summary{
    border-top:1px solid var(--line);
    background:var(--panel-2);
  }
  .infra-summary-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    font-size:13px;
    color:var(--muted);
  }
  .infra-summary-bar strong{color:var(--text);}
  .infra-summary-bar .totals{
    color:var(--accent-2);
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .infra-selected-chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:0 14px 12px;
  }
  .infra-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:5px 6px 5px 12px;
    font-size:12px;
    color:var(--text);
  }
  .infra-chip .chip-x{
    cursor:pointer;
    color:var(--muted);
    background:rgba(255,255,255,.06);
    border-radius:50%;
    width:18px;
    height:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    line-height:1;
    flex-shrink:0;
  }
  .infra-chip .chip-x:hover{color:var(--accent);background:rgba(194,59,59,.15);}
  @media(max-width:560px){
    .infra-layout{grid-template-columns:118px 1fr;max-height:480px;}
    .infra-row-grid{grid-template-columns:24px 1fr 74px;}
    .infra-item .infra-time, .infra-col-head .ch-time{display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">Arrestation LSPD</span>
    <h1>Dossier d'arrestation</h1>
    <p>Remplis le formulaire ci-dessous. Il sera envoyé automatiquement.</p>
  </header>

  <form id="form">

    <div class="section-title">Identité</div>
    <div class="grid">
      <div class="field"><label>Nom</label><input type="text" id="nom" required></div>
      <div class="field"><label>Prénom</label><input type="text" id="prenom" required></div>
      <div class="field"><label>Téléphone</label><input type="text" id="tel"></div>
      <div class="field"><label>ID</label><input type="text" id="id_civ" required></div>
    </div>

    <div class="section-title">Arrestation</div>
    <div class="grid">
      <div class="field"><label>Heure d'arrestation</label><input type="time" id="heure" required></div>
      <div class="field"><label>Agents présents</label><input type="text" id="agents" required></div>
      <div class="field full"><label>Photo de la saisie</label><input type="file" id="photo_saisie" accept="image/*"></div>
      <div class="field full"><label>Objet(s) saisie(s)</label><input type="text" id="objets_saisis" placeholder="Ex : 3 pochons de drogue, une arme de catégorie 3..."></div>
    </div>

    <div class="section-title">Faits reprochés</div>
    <div class="infraction-box">
      <div class="infra-search-wrap">
        <span class="infra-search-icon">🔍</span>
        <input type="text" id="infraSearch" placeholder="Rechercher une infraction..." class="infra-search">
      </div>
      <div class="infra-layout">
        <div class="infra-cats" id="infraCats"></div>
        <div class="infra-list-col">
          <div class="infra-col-head infra-row-grid">
            <span></span>
            <span class="ch-name">Infraction</span>
            <span class="ch-fine">Amende</span>
            <span class="ch-time">Peine</span>
          </div>
          <div class="infra-list" id="infraList"></div>
          <div class="infra-scroll-hint" id="infraScrollHint">▼ défiler pour voir plus</div>
        </div>
      </div>
      <div class="infra-summary">
        <div class="infra-summary-bar" id="infraSummaryBar">Aucune infraction sélectionnée</div>
        <div class="infra-selected-chips" id="infraChips"></div>
      </div>
    </div>
    <div class="field full" style="margin-top:12px;">
      <label>Précisions complémentaires (optionnel)</label>
      <textarea id="faitsNote" placeholder="Ajoute ici des détails sur les faits, le contexte, des circonstances particulières..."></textarea>
    </div>
    <input type="hidden" id="faits" required>

    <div class="section-title">Pièces jointes</div>
    <div class="grid">
      <div class="field full">
        <label>Pièce d'identité</label>
        <input type="file" id="piece_identite" accept="image/*">
      </div>
      <div class="field full">
        <label>Photos du suspect (jusqu'à 5)</label>
        <input type="file" id="photos_suspect" accept="image/*" multiple>
        <div id="photoCount" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
      </div>
    </div>

    <div class="check-row">
      <input type="checkbox" id="avocat">
      <label for="avocat">Le suspect demande un avocat</label>
    </div>

    <button type="submit" id="submitBtn">Envoyer le dossier</button>
    <div class="status" id="status"></div>
  </form>
</div>

<script>
// ============================================
// LISTE DES INFRACTIONS
// ============================================
const INFRACTIONS = {
  "Infraction au code de la route": [
    ["Amende excès de vitesse",150,0],
    ["Amende feu rouge",100,0],
    ["Circulation véhicule non homologué",320,0],
    ["Conduite dangereuse",230,0],
    ["Conduite en état d'ivresse",450,0],
    ["Conduite sans permis",500,0],
    ["Défaut d'assurance",450,0],
    ["Franchissement ligne continue",150,0],
    ["Non-port de la ceinture",250,0],
    ["Non-respect priorité",1100,0],
    ["Stationnement gênant / interdit",620,0],
    ["Téléphone au volant",850,0],
    ["Véhicule non conforme",1200,0],
    ["Dépassement dangereux",1000,0],
    ["Non-respect d'un stop",300,0]
  ],
  "Délit mineur": [
    ["Refus d'obtempérer",9500,5],
    ["Outrage à agent de police",9500,5],
    ["Dégradation de la voie publique",4500,5],
    ["Trouble à l'ordre public",9500,5],
    ["Obstruction à une opération policière",15000,10],
    ["Dissimulation du visage",2500,5],
    ["Délit de fuite",9500,5],
    ["Vol d'un véhicule terrestre",5000,5]
  ],
  "Délit moyen": [
    ["Braquage Supérette",10000,10],
    ["Cambriolage",10000,10],
    ["Braquage ATM",10000,10],
    ["Braquage Fleeca",50000,20],
    ["Braquage de Bijouterie",65000,20],
    ["Diffamation",10000,5],
    ["Usurpation d'identité",15000,5],
    ["Agression sur civil",30000,10],
    ["Agression sur membre de l'Etat",50000,15],
    ["Arme blanche sortie en ville",15000,5],
    ["Arme létale sortie en ville",25000,10],
    ["Défaut de PPA",30000,10],
    ["Port d'arme illégal (Catégorie 1/2)",200000,15],
    ["Port d'arme illégal (Catégorie 3)",320000,15],
    ["Port d'arme illégal (Catégorie 4)",700000,15],
    ["Possession d'argent sale (+20 000$)",0,5],
    ["Possession pochons de drogue",350,0],
    ["Évasion",50000,10],
    ["Tentative d'évasion",25000,5],
    ["Tentative de corruption",35000,10],
    ["Association de malfaiteurs",110000,0]
  ],
  "Délit grave": [
    ["Destruction de preuves",250000,15],
    ["Prise d'otage (/Otage)",150000,15],
    ["Tentative d'homicide (Civil)",200000,15],
    ["Tentative de prise d'otage sur agent de l'Etat",250000,20],
    ["Prise d'otage sur agent de l'État (/Otage)",350000,20],
    ["Blanchiment d'argent",0,15],
    ["Trafic d'armes (Catégorie 1 et 2)",150000,20],
    ["Trafic d'armes (Catégorie 3 et 4)",300000,20],
    ["Trafic de stupéfiants",100000,20],
    ["Cyberattaque",65000,15],
    ["Attaque d'un convoi",350000,25]
  ],
  "Fédéral": [
    ["Homicide (agent de l'État / Civil)",400000,60],
    ["Terrorisme",400000,60],
    ["Attaque d'un service public ou d'Etat",400000,60],
    ["Braquage de Pacific Bank",450000,60]
  ]
};

let currentCat = Object.keys(INFRACTIONS)[0];
let selected = {}; // name -> [fine, time]

function renderCats(){
  const wrap = document.getElementById("infraCats");
  wrap.innerHTML = "";
  Object.keys(INFRACTIONS).forEach(cat=>{
    const div = document.createElement("div");
    div.className = "infra-cat" + (cat === currentCat ? " active" : "");
    div.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-count">${INFRACTIONS[cat].length} infractions</span>`;
    div.addEventListener("click", ()=>{
      currentCat = cat;
      document.getElementById("infraSearch").value = "";
      renderCats();
      renderList();
    });
    wrap.appendChild(div);
  });
}

function renderList(filter){
  const wrap = document.getElementById("infraList");
  wrap.innerHTML = "";
  let items;
  if(filter){
    items = [];
    Object.values(INFRACTIONS).forEach(list=>{
      list.forEach(it=>{ if(it[0].toLowerCase().includes(filter.toLowerCase())) items.push(it); });
    });
  } else {
    items = INFRACTIONS[currentCat];
  }
  if(items.length === 0){
    wrap.innerHTML = `<div class="infra-empty">Aucun résultat</div>`;
    return;
  }
  items.forEach(([name, fine, time])=>{
    const row = document.createElement("div");
    const isSel = !!selected[name];
    row.className = "infra-item infra-row-grid" + (isSel ? " is-selected" : "");
    row.innerHTML = `
      <input type="checkbox" ${isSel ? "checked" : ""}>
      <span class="infra-name">${name}</span>
      <span class="infra-fine">$${fine.toLocaleString("fr-FR")}</span>
      <span class="infra-time">${time} min</span>
    `;
    const cb = row.querySelector("input");
    cb.addEventListener("change", ()=>{
      if(cb.checked) selected[name] = [fine, time];
      else delete selected[name];
      row.classList.toggle("is-selected", cb.checked);
      updateSummary();
    });
    row.addEventListener("click", (e)=>{
      if(e.target.tagName !== "INPUT"){
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event("change"));
      }
    });
    wrap.appendChild(row);
  });
}

function updateSummary(){
  const names = Object.keys(selected);
  const bar = document.getElementById("infraSummaryBar");
  const chips = document.getElementById("infraChips");

  if(names.length === 0){
    bar.innerHTML = "Aucune infraction sélectionnée";
    chips.innerHTML = "";
    rebuildFaitsField();
    return;
  }

  let totalFine = 0, totalTime = 0;
  names.forEach(n=>{ totalFine += selected[n][0]; totalTime += selected[n][1]; });

  bar.innerHTML = `<span><strong>${names.length}</strong> infraction(s) sélectionnée(s)</span><span class="totals">$${totalFine.toLocaleString("fr-FR")} · ${totalTime} min</span>`;

  chips.innerHTML = "";
  names.forEach(name=>{
    const chip = document.createElement("span");
    chip.className = "infra-chip";
    chip.innerHTML = `${name} <span class="chip-x">✕</span>`;
    chip.querySelector(".chip-x").addEventListener("click", ()=>{
      delete selected[name];
      updateSummary();
      renderList(document.getElementById("infraSearch").value.trim());
    });
    chips.appendChild(chip);
  });

  rebuildFaitsField();
}

function rebuildFaitsField(){
  const names = Object.keys(selected);
  let lines = [];

  if(names.length){
    let totalFine = 0, totalTime = 0;
    names.forEach(n=>{ totalFine += selected[n][0]; totalTime += selected[n][1]; });
    lines = names.map((n,i)=>`${i+1}. ${n}\n    Amende : $${selected[n][0].toLocaleString("fr-FR")}  |  Peine : ${selected[n][1]} min`);
    lines.push("", "————————————————————", `TOTAL : $${totalFine.toLocaleString("fr-FR")}  |  ${totalTime} min`);
  }

  const note = document.getElementById("faitsNote").value.trim();
  if(note){
    if(lines.length) lines.push("", "————————————————————", "Précisions :", note);
    else lines.push(note);
  }

  document.getElementById("faits").value = lines.join("\n");
}

document.getElementById("infraSearch").addEventListener("input", (e)=>{
  renderList(e.target.value.trim());
});

function updateScrollHint(){
  const list = document.getElementById("infraList");
  const hint = document.getElementById("infraScrollHint");
  const canScrollMore = (list.scrollHeight - list.scrollTop - list.clientHeight) > 8;
  hint.classList.toggle("show", canScrollMore);
}
document.getElementById("infraList").addEventListener("scroll", updateScrollHint);
new MutationObserver(updateScrollHint).observe(document.getElementById("infraList"), {childList:true});

document.getElementById("faitsNote").addEventListener("input", rebuildFaitsField);

renderCats();
renderList();

// ============================================
// CONFIGURATION — à remplir ici directement
// ============================================
const HOOK_CASIER  = "https://discord.com/api/webhooks/1522240888036790425/PZO7VwO_lAf-ZKb7cPM2u2aLapneNDuQ8NXboOWFptHkzq6Iw-0eXbJR2XVLl-kJqZEc";  // URL webhook du salon casier judiciaire
const HOOK_JUGE     = "https://discord.com/api/webhooks/1522241578146594816/KOFKA5b8jRcmp-BlCznrj8AxRkxKPuDXPth-gNjrEHF5EGrqzrb5appqAQNNlKNkHrRH";  // URL webhook du salon juge / procureur
const HOOK_AVOCAT   = "https://discord.com/api/webhooks/1522241702612566106/7U2_8Lhq8Nyh7k6VERZ39yZgDesqOWRbonSdWdWbCqyxf6hOQqnIuKIfvYvZWFcpDYIU";  // URL webhook du salon avocat
const HOOK_SAISIE   = "https://discord.com/api/webhooks/1522241832090730686/yNExdJlHhiCxw3k_vT4aCHfVwusOIDv3QftaQnpk89Zdhq4oAWysg7Su9A1nxEmC7DQA";  // URL webhook du salon saisie — à remplir
const ROLE_JUGE      = "1312399645556867136"; // ID du rôle Juge
const ROLE_PROCUREUR = "1312399645556867135"; // ID du rôle Procureur
const ROLE_AVOCAT    = "1312399645556867137"; // ID du rôle Avocat

document.getElementById("photos_suspect").addEventListener("change", (e)=>{
  const countEl = document.getElementById("photoCount");
  if(e.target.files.length > 5){
    countEl.style.color = "#ff8a8a";
    countEl.textContent = "Maximum 5 photos — seules les 5 premières seront envoyées.";
  } else {
    countEl.style.color = "var(--muted)";
    countEl.textContent = e.target.files.length + " photo(s) sélectionnée(s).";
  }
});

async function sendToWebhook(url, content, embeds, files, threadName){
  if(!url) return {skipped:true};

  if(files && files.length){
    const form = new FormData();
    const payload = { embeds };
    if(content) payload.content = content;
    if(threadName) payload.thread_name = threadName;

    files.forEach((file, i)=>{
      form.append("files["+i+"]", file, file.name);
    });
    form.append("payload_json", JSON.stringify(payload));

    const res = await fetch(url, { method:"POST", body: form });
    if(!res.ok){
      const txt = await res.text();
      throw new Error("Discord a refusé l'envoi ("+res.status+"): "+txt);
    }
    return {ok:true};
  } else {
    const payload = { embeds };
    if(content) payload.content = content;
    if(threadName) payload.thread_name = threadName;
    const res = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const txt = await res.text();
      throw new Error("Discord a refusé l'envoi ("+res.status+"): "+txt);
    }
    return {ok:true};
  }
}

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("submitBtn");
  statusEl.className = "status";
  statusEl.textContent = "";

  if(Object.keys(selected).length === 0 && !document.getElementById("faitsNote").value.trim()){
    statusEl.className = "status err";
    statusEl.textContent = "❌ Sélectionne au moins une infraction ou ajoute une précision.";
    return;
  }

  const data = {
    nom: document.getElementById("nom").value.trim(),
    prenom: document.getElementById("prenom").value.trim(),
    tel: document.getElementById("tel").value.trim() || "—",
    id_civ: document.getElementById("id_civ").value.trim(),
    heure: document.getElementById("heure").value.trim(),
    agents: document.getElementById("agents").value.trim(),
    faits: document.getElementById("faits").value.trim(),
    avocat: document.getElementById("avocat").checked,
    objets_saisis: document.getElementById("objets_saisis").value.trim()
  };

  const pieceFile = document.getElementById("piece_identite").files[0] || null;
  const saisieFile = document.getElementById("photo_saisie").files[0] || null;
  const photoFiles = Array.from(document.getElementById("photos_suspect").files).slice(0,5);
  // La photo de saisie part uniquement vers le salon saisie, elle n'est pas mélangée
  // avec le reste des photos envoyées en un seul message aux autres salons.
  const allFiles = [pieceFile, ...photoFiles].filter(Boolean);

  const hookCasier = HOOK_CASIER;
  const hookJuge = HOOK_JUGE;
  const hookAvocat = HOOK_AVOCAT;
  const hookSaisie = HOOK_SAISIE;
  const roleJuge = ROLE_JUGE;
  const roleProcureur = ROLE_PROCUREUR;
  const roleAvocat = ROLE_AVOCAT;

  function buildEmbeds(){
    // URL factice commune : Discord regroupe visuellement en une seule galerie
    // tous les embeds qui partagent le même champ "url".
    const groupUrl = "https://dossier.local/" + (data.id_civ || Date.now());

    const main = {
      title: "📁 Dossier d'arrestation",
      url: groupUrl,
      color: 0xc23b3b,
      fields: [
        { name: "Nom", value: data.nom || "—", inline: true },
        { name: "Prénom", value: data.prenom || "—", inline: true },
        { name: "Téléphone", value: data.tel, inline: true },
        { name: "ID", value: data.id_civ || "—", inline: true },
        { name: "Heure d'arrestation", value: data.heure || "—", inline: true },
        { name: "Agents présents", value: data.agents || "—", inline: true },
        { name: "Faits reprochés", value: data.faits || "—" },
        { name: "Demande un avocat", value: data.avocat ? "✅ Oui" : "❌ Non" }
      ],
      timestamp: new Date().toISOString()
    };
    const embeds = [main];

    if(pieceFile){
      main.image = { url: "attachment://" + pieceFile.name };
    }
    photoFiles.forEach((file)=>{
      embeds.push({ url: groupUrl, color: 0xc23b3b, image: { url: "attachment://" + file.name } });
    });
    return embeds;
  }

  function buildSaisieEmbed(){
    const embed = {
      title: "💊 Saisie",
      color: 0xd4a23b,
      fields: [
        { name: "Nom et prénom de l'individu", value: (data.nom || data.prenom) ? `${data.nom || "—"} ${data.prenom || "—"}` : "—" },
        { name: "Agent(s) présent(s)", value: data.agents || "—" },
        { name: "Objet(s) saisie(s)", value: data.objets_saisis || "—" }
      ],
      timestamp: new Date().toISOString()
    };
    if(saisieFile){
      embed.image = { url: "attachment://" + saisieFile.name };
    }
    return embed;
  }

  try{
    btn.disabled = true;
    btn.textContent = "Envoi en cours...";

    const embeds = buildEmbeds();

    // Casier judiciaire — création d'un post de forum (titre = NOM PRÉNOM)
    const threadNameCasier = `${(data.nom || "—").toUpperCase()} ${(data.prenom || "—").toUpperCase()}`.trim();
    const casierContent = `**- Nom : ${data.nom || "—"} - Prénom : ${data.prenom || "—"} - 📞 Tel : ${data.tel} - 🆔 ID : ${data.id_civ || "—"}**`;
    await sendToWebhook(hookCasier, casierContent, embeds, allFiles, threadNameCasier);

    // Juge / Procureur — ping les deux rôles
    let pingJuge = "";
    if(roleJuge) pingJuge += `<@&${roleJuge}> `;
    if(roleProcureur) pingJuge += `<@&${roleProcureur}> `;
    await sendToWebhook(hookJuge, pingJuge.trim() || undefined, embeds, allFiles);

    // Avocat — seulement si demandé, ping le rôle avocat
    if(data.avocat){
      let pingAvocat = roleAvocat ? `<@&${roleAvocat}>` : "";
      await sendToWebhook(hookAvocat, pingAvocat || undefined, embeds, allFiles);
    }

    // Saisie — message séparé et dédié, avec sa propre photo (si fournie)
    if(saisieFile || data.objets_saisis){
      await sendToWebhook(hookSaisie, undefined, [buildSaisieEmbed()], saisieFile ? [saisieFile] : []);
    }

    statusEl.className = "status ok";
    statusEl.textContent = "✅ Dossier envoyé avec succès.";
    document.getElementById("form").reset();
    document.getElementById("photoCount").textContent = "";
    selected = {};
    updateSummary();
    renderList();
  }catch(err){
    statusEl.className = "status err";
    statusEl.textContent = "❌ Erreur : " + err.message;
  }finally{
    btn.disabled = false;
    btn.textContent = "Envoyer le dossier";
  }
});
</script>
</body>
